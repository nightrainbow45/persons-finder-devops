spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Actuator configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# OpenAI API Key (injected from environment variable)
openai.api-key=${OPENAI_API_KEY:}

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.packages-to-scan=com.persons.finder.presentation
springdoc.paths-to-match=/api/v1/**

# Swagger Enable/Disable Switch
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# API Information (configurable via environment variables)
api.info.title=${API_TITLE:Persons Finder API}
api.info.version=${API_VERSION:1.0.0}
api.info.description=${API_DESCRIPTION:REST API for managing persons and their locations}

# CORS Configuration
# Comma-separated list of allowed origins (use "*" for development, specific domains for production)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
