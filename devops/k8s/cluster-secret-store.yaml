# ClusterSecretStore: connects External Secrets Operator to AWS Secrets Manager.
# Uses EC2 instance role (via IMDS) for authentication — requires IMDS hop limit = 2
# on EKS nodes (set in devops/terraform/modules/eks/main.tf via launch template).
#
# Apply with:
#   kubectl apply -f devops/k8s/cluster-secret-store.yaml

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2
