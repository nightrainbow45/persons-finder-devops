# ExternalSecret: syncs OPENAI_API_KEY from AWS Secrets Manager into a K8s Secret.
#
# The AWS secret must contain JSON in the format:
#   {"OPENAI_API_KEY": "sk-..."}
#
# Set the key value with:
#   aws secretsmanager put-secret-value \
#     --secret-id persons-finder/prod/openai-api-key \
#     --secret-string '{"OPENAI_API_KEY":"sk-..."}' \
#     --region ap-southeast-2
#
# Apply with:
#   kubectl apply -f devops/k8s/external-secret.yaml

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: persons-finder-secrets
  namespace: default
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: persons-finder-secrets
    creationPolicy: Owner
  data:
  - secretKey: OPENAI_API_KEY
    remoteRef:
      key: persons-finder/prod/openai-api-key
      property: OPENAI_API_KEY
